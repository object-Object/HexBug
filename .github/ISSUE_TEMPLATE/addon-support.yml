name: Addon support
description: Request your Hex Casting addon to be added to HexBug
assignees:
  - object-Object

body:
  - type: markdown
    attributes:
      value: |
        Please only fill out this form for your own addon - do not use it to request someone else's addon to be added. Additionally, addons licensed under something like GPL will not be accepted, as I'd like to keep HexBug licensed under MIT; LGPL is acceptable.

  - type: checkboxes
    attributes:
      label: Initial checks
      options:
        - label: I confirm that I am the author of this mod.
          required: true
        - label: I confirm that the license of this mod allows it to be used as a library in an MIT-licensed project (i.e. LGPL is fine, GPL is not).
          required: true

  - type: input
    attributes:
      label: PyPI URL
      description: The URL to the mod's hexdoc plugin on PyPI (strongly preferred), or a static URL pointing to a built wheel for the mod.
      placeholder: https://pypi.org/project/hexdoc-hexcasting
    validations:
      required: true

  - type: input
    attributes:
      label: Mod ID
      placeholder: hexcasting
    validations:
      required: true

  - type: input
    attributes:
      label: Display name
      placeholder: Hex Casting
    validations:
      required: true

  - type: input
    attributes:
      label: Description
      description: A short description of the mod to be displayed in `/mod`.
      placeholder: A mod for Forge and Fabric adding stack-based programmable spellcasting, inspired by Psi.
    validations:
      required: true

  - type: input
    attributes:
      label: Icon URL
      description: The path to the mod's icon in its Git repo (preferred), or a static URL pointing to the mod's icon.
      placeholder: Common/src/main/resources/logo.png

  - type: input
    attributes:
      label: CurseForge URL
      description: Please include this (if applicable) even if the mod is still under review.
      placeholder: https://www.curseforge.com/minecraft/mc-mods/hexcasting

  - type: input
    attributes:
      label: Modrinth URL
      description: Please include this (if applicable) even if the mod is still under review.
      placeholder: https://modrinth.com/mod/hex-casting

  - type: checkboxes
    attributes:
      label: Supported modloaders
      options:
        - label: Fabric
        - label: Forge
        - label: NeoForge
        - label: Quilt

  - type: textarea
    attributes:
      label: Other information
      description: Provide any additional context, comments, or requests here.
