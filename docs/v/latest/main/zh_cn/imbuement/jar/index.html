      <meta property="og:description" content="我的新工具功能不少，而且图案会从快捷栏中取用紫金石，也很方便。不过……我发现有些情况下，本领域内各种操作所需紫金石的数量仍会多到不便携带。比如说未完全灌注的法杖，它们的咒术网格的确更大，但也要不断用紫金石修补。又比如说魔咒图案，它们的紫金石耗量同样不少。一来一去，我的口袋就被紫金石塞得满满当当，手上都拿着东西，快捷栏也已装满，其他东西就没有位置放了。我必须找到解决方法。" />
