      <meta property="og:description" content="In my studies, I have discovered the art of Rigging. &#34;Rigged&#34; foci (or any iota holder, for that matter) cast a hex upon reads or writes. Reads cast after reading the iota (with it starting on the stack), and writes start before a write, starting with the iota-to-write on the stack. Curiously, writes also have the option to leave a boolean on the stack, indicating whether the write should go through. Further, writes are also brittle; they cannot &#39;recurse,&#39; or call themselves. Perhaps I could use this to my advantage..." />
