      <meta property="og:description" content="在研究的过程中，我发现了所谓藏咒的技艺。“藏过咒”的核心（当然其他 iota 存储物品都可以）会在被读写时施放咒术。读时会在读出 iota 后施法（栈以读出的 iota 起始），写时则会在写入前施法（栈以要写入的 iota 起始）。神奇的是，写触发还有以布尔值起始栈的选项，对应是否要把值写入目标。而且，写触发还是单层的：它们无法进行“递归”，也即无法调用自身。大概也能是个有用的性质吧……" />
